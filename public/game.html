<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Exploración</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
      overflow: hidden;
    }
    #ui {
      display: flex;
      gap: 32px;
      margin-bottom: 12px;
      font-size: 14px;
      letter-spacing: 1px;
    }
    .stat { display: flex; align-items: center; gap: 6px; }
    .stat span { color: #ffd700; font-weight: bold; }
    #canvas {
      border: 2px solid #4a4a8a;
      box-shadow: 0 0 40px rgba(100, 100, 255, 0.3);
      image-rendering: pixelated;
    }
    #minimap-container {
      position: absolute;
      top: 16px;
      right: 16px;
      border: 2px solid #4a4a8a;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    #minimap { display: block; }
    #hint {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
      letter-spacing: 1px;
    }
    #interact-hint {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      border: 1px solid #ffd700;
      color: #ffd700;
      padding: 4px 14px;
      font-size: 12px;
      border-radius: 3px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      font-family: 'Courier New', monospace;
    }
    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      border: 2px solid #ffd700;
      padding: 20px 36px;
      font-size: 18px;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.5s;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<div id="ui">
  <div class="stat">💎 Gemas: <span id="gems">0</span></div>
  <div class="stat">🗺️ Explorado: <span id="explored">0</span>%</div>
  <div class="stat">⭐ Nivel: <span id="level">1</span></div>
</div>

<canvas id="canvas" width="640" height="480"></canvas>
<div id="hint">WASD / Flechas para moverse · Explora el mapa y recoge las gemas</div>

<canvas id="minimap" width="120" height="90"></canvas>
<div id="minimap-container"><canvas id="minimap2" width="120" height="90"></canvas></div>

<div id="message" style="opacity:0"></div>
<div id="interact-hint">[ ESPACIO ] Hablar</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap2');
const mctx = minimapCanvas.getContext('2d');

const TILE = 32;
const MAP_W = 50;
const MAP_H = 38;
const VIEW_W = Math.floor(canvas.width / TILE);
const VIEW_H = Math.floor(canvas.height / TILE);

// ── Tipos de tile ──────────────────────────────────────────────
const T = { GRASS: 0, WATER: 1, TREE: 2, MOUNTAIN: 3, PATH: 4, SAND: 5, FLOWER: 6, DEEP: 7 };

const TILE_COLORS = {
  [T.GRASS]:    '#4a8c3f',
  [T.WATER]:    '#2a6fa8',
  [T.TREE]:     '#2d5a1b',
  [T.MOUNTAIN]: '#7a7a7a',
  [T.PATH]:     '#c8a96e',
  [T.SAND]:     '#d4b483',
  [T.FLOWER]:   '#4a8c3f',
  [T.DEEP]:     '#1a4a78',
};

// ── Generación del mapa ────────────────────────────────────────
function noise(x, y, seed) {
  let n = Math.sin(x * 127.1 + y * 311.7 + seed * 74.3) * 43758.5453;
  return n - Math.floor(n);
}

function smoothNoise(x, y, seed) {
  let v = 0;
  v += noise(x, y, seed) * 0.5;
  v += noise(x * 2, y * 2, seed + 1) * 0.25;
  v += noise(x * 4, y * 4, seed + 2) * 0.125;
  v += noise(x * 8, y * 8, seed + 3) * 0.0625;
  return v / 0.9375;
}

function generateMap() {
  const map = [];
  for (let y = 0; y < MAP_H; y++) {
    map[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      const h = smoothNoise(x / MAP_W, y / MAP_H, 42);
      const m = smoothNoise(x / MAP_W + 0.5, y / MAP_H + 0.5, 99);
      if (h < 0.25) map[y][x] = T.DEEP;
      else if (h < 0.35) map[y][x] = T.WATER;
      else if (h < 0.40) map[y][x] = T.SAND;
      else if (m > 0.72) map[y][x] = T.MOUNTAIN;
      else if (m > 0.60) map[y][x] = T.TREE;
      else if (noise(x, y, 7) > 0.88) map[y][x] = T.FLOWER;
      else map[y][x] = T.GRASS;
    }
  }
  // Caminos diagonales hacia el centro
  const cx = Math.floor(MAP_W / 2), cy = Math.floor(MAP_H / 2);
  for (let i = 0; i < MAP_W; i++) {
    map[cy][i] = T.PATH;
    if (map[Math.floor(cy * 0.5)][i] !== T.WATER && map[Math.floor(cy * 0.5)][i] !== T.DEEP)
      map[Math.floor(cy * 0.5)][i] = T.PATH;
  }
  for (let j = 0; j < MAP_H; j++) {
    map[j][cx] = T.PATH;
  }
  return map;
}

// ── NPCs ───────────────────────────────────────────────────────
const cx = Math.floor(MAP_W / 2);
const cy = Math.floor(MAP_H / 2);

const NPCS = [
  {
    x: 10, y: cy,
    name: 'Anciano Sabio',
    color: '#7090e0', robe: '#3050a0', skin: '#f0c890',
    beard: true, hat: false,
    lines: [
      'Bienvenido, viajero. Este mundo guarda muchos secretos.',
      'Las gemas brillan con la luz de estrellas antiguas...',
      'Explora cada rincón. La oscuridad no dura para siempre.',
    ]
  },
  {
    x: cx, y: 6,
    name: 'Mercader Finn',
    color: '#50a050', robe: '#286028', skin: '#e8b070',
    beard: false, hat: true,
    lines: [
      '¡Eh, viajero! ¿Buscas algo especial?',
      'He visto gemas por el norte, cerca de las montañas.',
      'Cuidado con los caminos del sur, son traicioneros.',
    ]
  },
  {
    x: 40, y: cy,
    name: 'Caballera Lyra',
    color: '#c0c0d0', robe: '#808090', skin: '#f5c88a',
    beard: false, hat: false, armor: true,
    lines: [
      'Alto. Identifícate.',
      '...Bien. Puedes pasar, explorador.',
      'Cuida tus pasos cerca del agua profunda.',
    ]
  },
  {
    x: cx, y: 30,
    name: 'Bruja Moira',
    color: '#9040b0', robe: '#601080', skin: '#c8a878',
    beard: false, hat: true, witch: true,
    lines: [
      'Hsss... otro curioso en mi territorio.',
      'Las gemas que buscas... tienen memoria propia.',
      'Recoge las 28 y algo especial ocurrirá. Lo prometo.',
    ]
  },
  {
    x: 18, y: 9,
    name: 'Niño Pip',
    color: '#e06030', robe: '#a04020', skin: '#f8d0a0',
    beard: false, hat: false, child: true,
    lines: [
      '¡Ey! ¿Eres un aventurero de verdad?',
      'Yo encontré una gema azul cerca del lago, ¡es enorme!',
      '¡Cuando sea mayor también exploraré todo el mundo!',
    ]
  },
  {
    x: 36, y: 26,
    name: 'Pescador Udo',
    color: '#4080a0', robe: '#204860', skin: '#d4a870',
    beard: true, hat: true, fisher: true,
    lines: [
      'Buenos días. O buenas noches. Ya no distingo.',
      'Llevo días pescando aquí. Nada muerde.',
      'Pero oye, el agua profunda esconde cosas bonitas...',
    ]
  },
];

// ── Diálogo ────────────────────────────────────────────────────
const dialogue = {
  active: false,
  npc: null,
  lineIndex: 0,
  charIndex: 0,
  charTimer: 0,
  CHAR_SPEED: 30,
};

function getNearbyNPC() {
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (const [dx, dy] of dirs) {
    const nx = player.x + dx, ny = player.y + dy;
    const npc = NPCS.find(n => n.x === nx && n.y === ny);
    if (npc) return npc;
  }
  return null;
}

function startDialogue(npc) {
  dialogue.active = true;
  dialogue.npc = npc;
  dialogue.lineIndex = 0;
  dialogue.charIndex = 0;
  dialogue.charTimer = 0;
  spaceWasDown = true; // evita avance inmediato al abrir
}

function advanceDialogue() {
  const npc = dialogue.npc;
  const line = npc.lines[dialogue.lineIndex];
  if (dialogue.charIndex < line.length) {
    dialogue.charIndex = line.length;
    return;
  }
  dialogue.lineIndex++;
  if (dialogue.lineIndex >= npc.lines.length) {
    dialogue.active = false;
    dialogue.npc = null;
  } else {
    dialogue.charIndex = 0;
    dialogue.charTimer = 0;
  }
}

let spaceWasDown = false;
function handleDialogueInput() {
  const spaceDown = keys[' '] || keys['Enter'] || keys['z'] || keys['Z'];
  if (spaceDown && !spaceWasDown) {
    advanceDialogue();
  }
  spaceWasDown = spaceDown;
}

function updateDialogue(dt) {
  if (!dialogue.active) return;
  const line = dialogue.npc.lines[dialogue.lineIndex];
  if (dialogue.charIndex < line.length) {
    dialogue.charTimer += dt;
    while (dialogue.charTimer >= dialogue.CHAR_SPEED && dialogue.charIndex < line.length) {
      dialogue.charIndex++;
      dialogue.charTimer -= dialogue.CHAR_SPEED;
    }
  }
}

// ── Dibujo caja de diálogo ─────────────────────────────────────
function drawDialogueBox() {
  if (!dialogue.active) return;
  const npc = dialogue.npc;
  const line = npc.lines[dialogue.lineIndex];
  const visible = line.slice(0, dialogue.charIndex);

  const bx = 20, by = canvas.height - 130, bw = canvas.width - 40, bh = 110;
  const portSize = 80;

  // Fondo
  ctx.fillStyle = 'rgba(10,10,30,0.95)';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = '#7080c0';
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);

  // Retrato
  const px = bx + 10, py = by + 10;
  ctx.fillStyle = 'rgba(30,30,60,0.9)';
  ctx.fillRect(px, py, portSize, portSize);
  ctx.strokeStyle = '#5060a0';
  ctx.lineWidth = 1;
  ctx.strokeRect(px, py, portSize, portSize);
  drawNPCPortrait(npc, px, py, portSize);

  // Nombre
  const tx = px + portSize + 14;
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 14px "Courier New"';
  ctx.fillText(npc.name, tx, by + 26);

  // Línea separadora bajo el nombre
  ctx.strokeStyle = '#ffd70066';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(tx, by + 30);
  ctx.lineTo(bx + bw - 12, by + 30);
  ctx.stroke();

  // Texto con wrap
  ctx.fillStyle = '#e8e8e8';
  ctx.font = '13px "Courier New"';
  const maxW = bw - portSize - 34;
  wrapText(ctx, visible, tx, by + 50, maxW, 20);

  // Indicador de continuar (parpadeo)
  const isComplete = dialogue.charIndex >= line.length;
  const isLast = dialogue.lineIndex >= npc.lines.length - 1;
  if (isComplete) {
    const blink = Math.floor(Date.now() / 400) % 2 === 0;
    if (blink) {
      ctx.fillStyle = '#ffd700';
      ctx.font = '11px "Courier New"';
      ctx.fillText(isLast ? '[ ESPACIO ] Cerrar' : '[ ESPACIO ] Continuar ▼', tx, by + bh - 12);
    }
  }
}

function wrapText(ctx, text, x, y, maxWidth, lineH) {
  const words = text.split(' ');
  let line = '';
  let lineY = y;
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, lineY);
      lineY += lineH;
      line = word;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, lineY);
}

// ── Dibujo de NPC en mapa ──────────────────────────────────────
function drawNPC(npc, sx, sy) {
  const t = Date.now() / 800;
  const bob = Math.sin(t + npc.x) * 1.5;
  const scale = npc.child ? 0.75 : 1;
  const yOff = npc.child ? 6 : 0;

  ctx.save();
  ctx.translate(sx + TILE/2, sy + TILE/2 + yOff);
  ctx.scale(scale, scale);

  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 12, 7, 3, 0, 0, Math.PI*2);
  ctx.fill();

  const by2 = -12 + bob;

  // Ropa / cuerpo
  ctx.fillStyle = npc.robe;
  ctx.fillRect(-6, by2 + 4, 12, 14);

  // Cabeza
  ctx.fillStyle = npc.skin;
  ctx.beginPath();
  ctx.arc(0, by2 - 1, 7, 0, Math.PI*2);
  ctx.fill();

  // Ojos
  ctx.fillStyle = '#333';
  ctx.fillRect(-3, by2 - 2, 2, 2);
  ctx.fillRect(1, by2 - 2, 2, 2);

  // Barba
  if (npc.beard) {
    ctx.fillStyle = '#ddd';
    ctx.beginPath();
    ctx.arc(0, by2 + 4, 5, 0, Math.PI);
    ctx.fill();
  }

  // Sombrero
  if (npc.hat && !npc.witch) {
    ctx.fillStyle = npc.color;
    ctx.fillRect(-7, by2 - 9, 14, 4);
    ctx.fillRect(-4, by2 - 15, 8, 7);
  }
  if (npc.witch) {
    ctx.fillStyle = npc.robe;
    ctx.beginPath();
    ctx.moveTo(0, by2 - 20);
    ctx.lineTo(8, by2 - 7);
    ctx.lineTo(-8, by2 - 7);
    ctx.closePath();
    ctx.fill();
    ctx.fillRect(-9, by2 - 9, 18, 3);
  }

  // Armadura (brillo metálico)
  if (npc.armor) {
    ctx.fillStyle = '#d0d0e0';
    ctx.fillRect(-6, by2 + 4, 12, 8);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(-5, by2 + 5, 4, 6);
  }

  // Caña de pescar
  if (npc.fisher) {
    ctx.strokeStyle = '#8b5e3c';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(6, by2);
    ctx.lineTo(14, by2 - 10);
    ctx.stroke();
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(14, by2 - 10);
    ctx.lineTo(16, by2 + 4);
    ctx.stroke();
  }

  ctx.restore();

  // Burbuja "!" si el jugador está adyacente
  const dist = Math.abs(npc.x - player.x) + Math.abs(npc.y - player.y);
  if (dist === 1 && !dialogue.active) {
    const blink = Math.floor(Date.now() / 300) % 2 === 0;
    if (blink) {
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 14px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillText('!', sx + TILE/2, sy - 4);
      ctx.textAlign = 'left';
    }
  }
}

// ── Retrato en caja de diálogo ─────────────────────────────────
function drawNPCPortrait(npc, px, py, size) {
  const cx2 = px + size/2, cy2 = py + size/2;

  // Fondo degradado de color del NPC
  const grad = ctx.createRadialGradient(cx2, cy2, 5, cx2, cy2, size/2);
  grad.addColorStop(0, npc.robe + '88');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(px, py, size, size);

  // Cuerpo
  ctx.fillStyle = npc.robe;
  ctx.fillRect(cx2 - 14, cy2 + 10, 28, 25);

  // Cabeza grande
  ctx.fillStyle = npc.skin;
  ctx.beginPath();
  ctx.arc(cx2, cy2, 16, 0, Math.PI*2);
  ctx.fill();

  // Ojos expresivos
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(cx2 - 6, cy2 - 2, 3, 0, Math.PI*2);
  ctx.arc(cx2 + 6, cy2 - 2, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(cx2 - 5, cy2 - 3, 1, 0, Math.PI*2);
  ctx.arc(cx2 + 7, cy2 - 3, 1, 0, Math.PI*2);
  ctx.fill();

  // Boca
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx2, cy2 + 6, 6, 0.2, Math.PI - 0.2);
  ctx.stroke();

  if (npc.beard) {
    ctx.fillStyle = '#e8e8e8';
    ctx.beginPath();
    ctx.arc(cx2, cy2 + 14, 10, 0, Math.PI);
    ctx.fill();
  }
  if (npc.hat && !npc.witch) {
    ctx.fillStyle = npc.color;
    ctx.fillRect(cx2 - 16, cy2 - 17, 32, 6);
    ctx.fillRect(cx2 - 10, cy2 - 28, 20, 13);
  }
  if (npc.witch) {
    ctx.fillStyle = npc.robe;
    ctx.beginPath();
    ctx.moveTo(cx2, cy2 - 36);
    ctx.lineTo(cx2 + 18, cy2 - 14);
    ctx.lineTo(cx2 - 18, cy2 - 14);
    ctx.closePath();
    ctx.fill();
    ctx.fillRect(cx2 - 19, cy2 - 17, 38, 5);
  }
  if (npc.armor) {
    ctx.fillStyle = '#c8c8d8';
    ctx.fillRect(cx2 - 14, cy2 + 10, 28, 14);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillRect(cx2 - 12, cy2 + 12, 10, 10);
  }
}

// ── Gemas ──────────────────────────────────────────────────────
function placeGems(map) {
  const gems = [];
  for (let i = 0; i < 28; i++) {
    let x, y, tries = 0;
    do {
      x = 1 + Math.floor(Math.random() * (MAP_W - 2));
      y = 1 + Math.floor(Math.random() * (MAP_H - 2));
      tries++;
    } while (
      (map[y][x] === T.WATER || map[y][x] === T.DEEP || map[y][x] === T.MOUNTAIN) &&
      tries < 100
    );
    if (tries < 100) gems.push({ x, y, collected: false, color: `hsl(${Math.random()*360|0},90%,65%)` });
  }
  return gems;
}

const map = generateMap();
const gems = placeGems(map);

// ── Fog of war ─────────────────────────────────────────────────
const fog = Array.from({ length: MAP_H }, () => new Array(MAP_W).fill(0));
// 0 = no visto, 1 = visitado (oscuro), 2 = visible

function updateFog(px, py) {
  const r = 4;
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      if (dx*dx + dy*dy > r*r) continue;
      const nx = px + dx, ny = py + dy;
      if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H) {
        fog[ny][nx] = 2;
      }
    }
  }
}

function decayFog() {
  for (let y = 0; y < MAP_H; y++)
    for (let x = 0; x < MAP_W; x++)
      if (fog[y][x] === 2) fog[y][x] = 1;
}

// ── Jugador ────────────────────────────────────────────────────
const player = {
  x: Math.floor(MAP_W / 2),
  y: Math.floor(MAP_H / 2),
  px: Math.floor(MAP_W / 2) * TILE,  // posición en píxeles (suave)
  py: Math.floor(MAP_H / 2) * TILE,
  dir: 0, // 0=abajo 1=izq 2=der 3=arriba
  frame: 0,
  moving: false,
  targetX: Math.floor(MAP_W / 2),
  targetY: Math.floor(MAP_H / 2),
  speed: 4,
  gemsCollected: 0,
};

// ── Cámara ─────────────────────────────────────────────────────
const cam = { x: 0, y: 0 };

function updateCamera() {
  const targetCX = player.px - (VIEW_W / 2) * TILE + TILE / 2;
  const targetCY = player.py - (VIEW_H / 2) * TILE + TILE / 2;
  cam.x += (targetCX - cam.x) * 0.1;
  cam.y += (targetCY - cam.y) * 0.1;
  cam.x = Math.max(0, Math.min(cam.x, (MAP_W - VIEW_W) * TILE));
  cam.y = Math.max(0, Math.min(cam.y, (MAP_H - VIEW_H) * TILE));
}

// ── Input ──────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  e.preventDefault();
  // Iniciar diálogo con Espacio/Enter si no está activo
  if ((e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z') && !dialogue.active) {
    const nearby = getNearbyNPC();
    if (nearby) startDialogue(nearby);
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function isWalkable(x, y) {
  if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H) return false;
  const t = map[y][x];
  if (t === T.WATER || t === T.DEEP || t === T.MOUNTAIN) return false;
  if (NPCS.some(n => n.x === x && n.y === y)) return false;
  return true;
}

let moveTimer = 0;
function handleInput(dt) {
  if (dialogue.active) { handleDialogueInput(); return; }
  if (player.moving) return;
  moveTimer += dt;
  if (moveTimer < 120) return;
  moveTimer = 0;

  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) { dx = -1; player.dir = 1; }
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) { dx = 1;  player.dir = 2; }
  else if (keys['ArrowUp']    || keys['w'] || keys['W']) { dy = -1; player.dir = 3; }
  else if (keys['ArrowDown']  || keys['s'] || keys['S']) { dy = 1;  player.dir = 0; }

  if (dx === 0 && dy === 0) return;

  const nx = player.x + dx;
  const ny = player.y + dy;
  if (isWalkable(nx, ny)) {
    player.targetX = nx;
    player.targetY = ny;
    player.moving = true;
  }
}

function updatePlayer(dt) {
  if (!player.moving) return;
  const tx = player.targetX * TILE;
  const ty = player.targetY * TILE;
  const speed = player.speed * dt * 0.1;
  const dx = tx - player.px;
  const dy = ty - player.py;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < speed * 2 || dist < 2) {
    player.px = tx;
    player.py = ty;
    player.x = player.targetX;
    player.y = player.targetY;
    player.moving = false;
    player.frame = (player.frame + 1) % 4;
    decayFog();
    updateFog(player.x, player.y);
    checkGems();
  } else {
    player.px += (dx / dist) * speed;
    player.py += (dy / dist) * speed;
  }
}

// ── Gemas: recolección ─────────────────────────────────────────
let msgTimer = 0;
function showMessage(text, duration = 1800) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.style.opacity = '1';
  msgTimer = duration;
}

function checkGems() {
  for (const g of gems) {
    if (!g.collected && g.x === player.x && g.y === player.y) {
      g.collected = true;
      player.gemsCollected++;
      document.getElementById('gems').textContent = player.gemsCollected;
      if (player.gemsCollected === gems.length) {
        showMessage('¡Has encontrado todas las gemas! 🏆', 5000);
      } else if (player.gemsCollected % 5 === 0) {
        showMessage(`¡${player.gemsCollected} gemas! Sigue explorando...`, 1500);
        document.getElementById('level').textContent = Math.floor(player.gemsCollected / 5) + 1;
      }
    }
  }
}

// ── Dibujo de tiles ────────────────────────────────────────────
function drawTile(tx, ty, screenX, screenY, fogLevel) {
  const type = map[ty][tx];
  const col = TILE_COLORS[type];
  ctx.fillStyle = col;
  ctx.fillRect(screenX, screenY, TILE, TILE);

  // Detalles
  ctx.save();
  if (type === T.GRASS || type === T.FLOWER) {
    ctx.fillStyle = fogLevel === 2 ? '#5aac4f' : '#3d7535';
    for (let i = 0; i < 4; i++) {
      const bx = screenX + noise(tx*3+i, ty*3, 0) * TILE;
      const by = screenY + noise(tx*3+i, ty*3, 1) * TILE;
      ctx.fillRect(bx, by, 2, 3);
    }
  }
  if (type === T.FLOWER) {
    ctx.fillStyle = fogLevel === 2 ? '#ff88cc' : '#cc5599';
    for (let i = 0; i < 3; i++) {
      const bx = screenX + 4 + noise(tx+i*5, ty, 5) * (TILE - 8);
      const by = screenY + 4 + noise(tx+i*5, ty, 6) * (TILE - 8);
      ctx.beginPath();
      ctx.arc(bx, by, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  if (type === T.TREE) {
    ctx.fillStyle = fogLevel === 2 ? '#1e6b0d' : '#164d08';
    ctx.beginPath();
    ctx.moveTo(screenX + TILE/2, screenY + 2);
    ctx.lineTo(screenX + TILE - 4, screenY + TILE - 4);
    ctx.lineTo(screenX + 4, screenY + TILE - 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = fogLevel === 2 ? '#3a8f28' : '#285f19';
    ctx.beginPath();
    ctx.moveTo(screenX + TILE/2, screenY + 4);
    ctx.lineTo(screenX + TILE - 6, screenY + TILE - 2);
    ctx.lineTo(screenX + 6, screenY + TILE - 2);
    ctx.closePath();
    ctx.fill();
  }
  if (type === T.MOUNTAIN) {
    ctx.fillStyle = fogLevel === 2 ? '#aaaaaa' : '#777';
    ctx.beginPath();
    ctx.moveTo(screenX + TILE/2, screenY + 2);
    ctx.lineTo(screenX + TILE - 2, screenY + TILE - 2);
    ctx.lineTo(screenX + 2, screenY + TILE - 2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ddd';
    ctx.beginPath();
    ctx.moveTo(screenX + TILE/2, screenY + 2);
    ctx.lineTo(screenX + TILE/2 + 6, screenY + 10);
    ctx.lineTo(screenX + TILE/2 - 6, screenY + 10);
    ctx.closePath();
    ctx.fill();
  }
  if (type === T.WATER || type === T.DEEP) {
    ctx.fillStyle = fogLevel === 2
      ? (type === T.WATER ? 'rgba(150,200,255,0.3)' : 'rgba(80,130,200,0.3)')
      : 'rgba(50,80,130,0.3)';
    ctx.fillRect(screenX, screenY, TILE, TILE);
  }
  if (type === T.PATH) {
    ctx.fillStyle = fogLevel === 2 ? '#e8c88a' : '#a8906a';
    ctx.fillRect(screenX + 2, screenY + 2, TILE - 4, TILE - 4);
  }
  ctx.restore();

  // Niebla
  if (fogLevel === 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(screenX, screenY, TILE, TILE);
  }
}

// ── Dibujo del jugador ─────────────────────────────────────────
function drawPlayer(sx, sy) {
  const t = Date.now() / 200;
  const bob = player.moving ? Math.sin(t) * 2 : 0;
  const x = sx + 4;
  const y = sy + 2 + bob;
  const w = TILE - 8;
  const h = TILE - 4;

  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(sx + TILE/2, sy + TILE - 2, 8, 3, 0, 0, Math.PI*2);
  ctx.fill();

  // Cuerpo
  ctx.fillStyle = '#e8d5a0';
  ctx.fillRect(x + 3, y + 8, w - 6, h - 10);

  // Cabeza
  ctx.fillStyle = '#f5c88a';
  ctx.beginPath();
  ctx.arc(sx + TILE/2, y + 7, 7, 0, Math.PI * 2);
  ctx.fill();

  // Ojos según dirección
  ctx.fillStyle = '#333';
  if (player.dir === 0) { // abajo
    ctx.fillRect(sx + TILE/2 - 4, y + 6, 2, 2);
    ctx.fillRect(sx + TILE/2 + 2, y + 6, 2, 2);
  } else if (player.dir === 3) { // arriba
    ctx.fillRect(sx + TILE/2 - 3, y + 5, 2, 2);
    ctx.fillRect(sx + TILE/2 + 1, y + 5, 2, 2);
  } else if (player.dir === 1) { // izq
    ctx.fillRect(sx + TILE/2 - 5, y + 6, 2, 2);
    ctx.fillRect(sx + TILE/2 - 1, y + 6, 2, 2);
  } else { // der
    ctx.fillRect(sx + TILE/2 + 1, y + 6, 2, 2);
    ctx.fillRect(sx + TILE/2 + 4, y + 6, 2, 2);
  }

  // Capa
  ctx.fillStyle = '#e05030';
  ctx.beginPath();
  ctx.moveTo(x + 3, y + 10);
  ctx.lineTo(x - 2, y + h - 2);
  ctx.lineTo(x + 5, y + h - 6);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + w - 3, y + 10);
  ctx.lineTo(x + w + 2, y + h - 2);
  ctx.lineTo(x + w - 5, y + h - 6);
  ctx.closePath();
  ctx.fill();
}

// ── Dibujo de gemas ────────────────────────────────────────────
function drawGem(sx, sy, color) {
  const t = Date.now() / 600;
  const bob = Math.sin(t) * 3;
  const cx = sx + TILE / 2;
  const cy = sy + TILE / 2 + bob;
  const r = 6;

  ctx.save();
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(cx, cy - r);
  ctx.lineTo(cx + r * 0.6, cy - r * 0.2);
  ctx.lineTo(cx + r * 0.6, cy + r * 0.3);
  ctx.lineTo(cx, cy + r);
  ctx.lineTo(cx - r * 0.6, cy + r * 0.3);
  ctx.lineTo(cx - r * 0.6, cy - r * 0.2);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.moveTo(cx - 2, cy - r + 2);
  ctx.lineTo(cx + 2, cy - r * 0.5);
  ctx.lineTo(cx - 2, cy - r * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ── Minimapa ───────────────────────────────────────────────────
function drawMinimap() {
  const mw = 120, mh = 90;
  const tw = mw / MAP_W, th = mh / MAP_H;
  mctx.clearRect(0, 0, mw, mh);

  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (fog[y][x] === 0) {
        mctx.fillStyle = '#111';
      } else {
        mctx.fillStyle = TILE_COLORS[map[y][x]];
        if (fog[y][x] === 1) mctx.globalAlpha = 0.5;
      }
      mctx.fillRect(x * tw, y * th, Math.ceil(tw), Math.ceil(th));
      mctx.globalAlpha = 1;
    }
  }

  // Gemas no recogidas visibles
  for (const g of gems) {
    if (!g.collected && fog[g.y][g.x] > 0) {
      mctx.fillStyle = g.color;
      mctx.fillRect(g.x * tw, g.y * th, Math.ceil(tw), Math.ceil(th));
    }
  }

  // Jugador
  mctx.fillStyle = '#fff';
  mctx.fillRect(player.x * tw - 1, player.y * th - 1, 3, 3);
}

// ── Contador de exploración ────────────────────────────────────
function calcExplored() {
  let seen = 0;
  for (let y = 0; y < MAP_H; y++)
    for (let x = 0; x < MAP_W; x++)
      if (fog[y][x] > 0) seen++;
  return Math.floor(seen / (MAP_W * MAP_H) * 100);
}

// ── Mensaje de fadeout ─────────────────────────────────────────
function updateMessage(dt) {
  if (msgTimer > 0) {
    msgTimer -= dt;
    if (msgTimer <= 0) {
      document.getElementById('message').style.opacity = '0';
    }
  }
}

// ── Game loop ──────────────────────────────────────────────────
let last = 0;
let frameCount = 0;
function loop(ts) {
  const dt = Math.min(ts - last, 50);
  last = ts;
  frameCount++;

  handleInput(dt);
  updatePlayer(dt);
  updateCamera();
  updateMessage(dt);
  updateDialogue(dt);

  // Hint de interacción
  const interactHint = document.getElementById('interact-hint');
  interactHint.style.opacity = (!dialogue.active && getNearbyNPC()) ? '1' : '0';

  // Render
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const startTX = Math.floor(cam.x / TILE);
  const startTY = Math.floor(cam.y / TILE);
  const offsetX = -(cam.x % TILE);
  const offsetY = -(cam.y % TILE);

  for (let ty = 0; ty <= VIEW_H + 1; ty++) {
    for (let tx = 0; tx <= VIEW_W + 1; tx++) {
      const mx = startTX + tx;
      const my = startTY + ty;
      if (mx < 0 || mx >= MAP_W || my < 0 || my >= MAP_H) continue;
      if (fog[my][mx] === 0) continue;
      const sx = tx * TILE + offsetX;
      const sy = ty * TILE + offsetY;
      drawTile(mx, my, sx, sy, fog[my][mx]);
    }
  }

  // Gemas visibles
  for (const g of gems) {
    if (g.collected) continue;
    if (fog[g.y][g.x] < 2) continue;
    const sx = (g.x - startTX) * TILE + offsetX;
    const sy = (g.y - startTY) * TILE + offsetY;
    if (sx > -TILE && sx < canvas.width && sy > -TILE && sy < canvas.height) {
      drawGem(sx, sy, g.color);
    }
  }

  // NPCs
  for (const npc of NPCS) {
    if (fog[npc.y][npc.x] === 0) continue;
    const sx = (npc.x - startTX) * TILE + offsetX;
    const sy = (npc.y - startTY) * TILE + offsetY;
    if (sx > -TILE && sx < canvas.width && sy > -TILE && sy < canvas.height) {
      drawNPC(npc, sx, sy);
    }
  }

  // Jugador
  const psx = (player.px / TILE - startTX) * TILE + offsetX;
  const psy = (player.py / TILE - startTY) * TILE + offsetY;
  drawPlayer(psx, psy);

  // Diálogo encima de todo
  drawDialogueBox();

  // UI: minimap y stats
  if (frameCount % 6 === 0) {
    drawMinimap();
    document.getElementById('explored').textContent = calcExplored();
  }

  requestAnimationFrame(loop);
}

// Arranque
updateFog(player.x, player.y);
showMessage('¡Explora el mundo y recoge todas las gemas! 💎', 2500);
requestAnimationFrame(loop);
</script>
